document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Brand Identity Overview · branday<\u002Ftitle>\n<style>/* ──────────────────────────────────────────────────────────────\n   BRANDAY DESIGN SYSTEM — Foundations\n   Source of truth: the VISUAL SYSTEM.fig file (Figma) + brand brief.\n   Where the brief and Figma disagree, this file follows Figma.\n   ────────────────────────────────────────────────────────────── */\n\n/* Fonts — self-hosted Cabin TTFs sit in /fonts. These are the brand's\n   official fonts. The full Cabin family (Regular 400, Medium 500, Bold\n   700) is self-hosted — no external font dependency. Cabin Condensed is\n   kept available for ultra-tight display headlines. */\n@font-face {\n  font-family: \"Cabin\";\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"61d377fd-6a86-4784-8631-9af7c0ab2651\") format(\"truetype\");\n}\n@font-face {\n  font-family: \"Cabin\";\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"9e21770e-bc0c-4523-ac27-e4f680e2485a\") format(\"truetype\");\n}\n@font-face {\n  font-family: \"Cabin\";\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"be3f27e1-40c6-4a92-ae0b-401842d7cc43\") format(\"truetype\");\n}\n@font-face {\n  font-family: \"Cabin Condensed\";\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"a481a222-a0af-403f-9690-ea75abd1496c\") format(\"truetype\");\n}\n@font-face {\n  font-family: \"Cabin Condensed\";\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"b5b4b0b2-edb1-4c59-bf02-f90d613ebefb\") format(\"truetype\");\n}\n@font-face {\n  font-family: \"Cabin Condensed\";\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ef02a90d-da02-4553-a5c0-5db9275ff9a6\") format(\"truetype\");\n}\n:root {\n  /* ─── COLOR TOKENS ─────────────────────────────────────────── */\n\n  /* Brand */\n  --color-sunny:    #FFC300;  /* primary accent, CTA, surfaces */\n  --color-ooorange: #FF6A00;  /* secondary accent, gradient stop */\n  --color-funsia:   #FF00E5;  /* magenta highlight, gradient stop */\n  --color-dark:     #1E1E1E;  /* primary text, dark surfaces, primary CTA */\n  --color-light:    #FFFBF5;  /* DEFAULT page background (warm off-white) */\n\n  /* Neutrals (sparingly used, lifted from Figma) */\n  --color-grey-300: #DDDDDD;  /* hairline borders */\n  --color-grey-200: #D9D9D9;  /* placeholder fills */\n  --color-grey-500: #8E8989;  /* muted text */\n\n  /* Brand-extended accents seen in the Figma but rare */\n  --color-violet:   #A100FF;\n  --color-blush:    #FFBEF8;\n  --color-citron:   #FFF600;\n  --color-coral:    #EB6A6A;\n  --color-amber:    #FFB800;\n  --color-rose:     #FFCECE;\n  --color-rose-deep:#FF006F;\n  --color-lavender: #9380FF;\n\n  /* ─── SEMANTIC COLOR ROLES ─────────────────────────────────── */\n  --bg:           var(--color-light);\n  --bg-dark:      var(--color-dark);\n  --fg:           var(--color-dark);\n  --fg-on-dark:   var(--color-light);\n  --fg-muted:     color-mix(in srgb, var(--color-dark) 60%, transparent);\n  --fg-subtle:    color-mix(in srgb, var(--color-dark) 40%, transparent);\n  --border:       color-mix(in srgb, var(--color-dark) 12%, transparent);\n  --border-strong:var(--color-dark);\n\n  /* CTA roles */\n  --cta-primary-bg:    var(--color-dark);\n  --cta-primary-fg:    var(--color-light);\n  --cta-secondary-bg:  var(--color-sunny);\n  --cta-secondary-fg:  var(--color-dark);\n  --cta-ghost-fg:      var(--color-dark);\n  --cta-ghost-border:  var(--color-dark);\n\n  /* ─── GRADIENTS ─────────────────────────────────────────────\n     The signature \"spectrum\" gradient runs yellow → orange → magenta.\n     In the Figma it is most often used vertical (top→bottom).\n     Use `--gradient-spectrum` for full-bleed surfaces and the orb. */\n  --gradient-spectrum:\n    linear-gradient(180deg, #FFC300 0%, #FF6A00 40%, #FF00E5 100%);\n  --gradient-spectrum-diag:\n    linear-gradient(135deg, #FF6A00 0%, #FFC300 45%, #FF00E5 100%);\n  --gradient-orb:           /* radial orb — soft, blurred glow */\n    radial-gradient(circle at 50% 60%, #FFE89A 0%, #FFC300 22%, #FF6A00 55%, rgba(255,106,0,0) 78%);\n  --gradient-orbit-stroke:  /* gradient used to fill the orbit-ring SVG */\n    linear-gradient(90deg, #FFC300 0%, #FF6A00 50%, #FF00E5 100%);\n  --gradient-sunset:        /* glow rising from the bottom of a dark surface */\n    radial-gradient(120% 80% at 50% 130%, #FFC300 0%, #FF6A00 25%, transparent 60%);\n\n  /* ─── RADII ─────────────────────────────────────────────────\n     The Figma uses 30px on every panel/card. Keep it large. */\n  --radius-sm:  8px;\n  --radius-md:  16px;\n  --radius-lg:  30px;   /* the brand default for cards & surfaces */\n  --radius-xl:  48px;\n  --radius-pill: 999px;\n\n  /* ─── ELEVATION / SHADOWS ───────────────────────────────────\n     Soft shadows only. Light-first; the Figma rarely uses shadows. */\n  --shadow-1: 0 1px 2px rgba(30,30,30,0.04);\n  --shadow-2: 0 8px 24px rgba(30,30,30,0.06);\n  --shadow-3: 0 24px 64px rgba(30,30,30,0.10);\n  --glow-orb: 0 0 120px 40px rgba(255,106,0,0.55),\n              0 0 240px 80px rgba(255,0,229,0.25);\n\n  /* ─── SPACING (4px base) ────────────────────────────────────*/\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* ─── LAYOUT ────────────────────────────────────────────────*/\n  --content-max: 1280px;\n  --gutter: 24px;\n  --hit-min: 44px;\n\n  /* ─── MOTION ────────────────────────────────────────────────*/\n  --easing-in:   cubic-bezier(0.22, 1, 0.36, 1);\n  --easing-out:  cubic-bezier(0.4, 0, 1, 1);\n  --dur-micro:   200ms;\n  --dur-comp:    400ms;\n  --dur-section: 600ms;\n\n  /* ─── TYPOGRAPHY TOKENS ─────────────────────────────────────\n     Branday's display feel is BIG Cabin Regular set tight (-0.02em).\n     Cabin Condensed is kept available for ultra-tight headlines but\n     the Figma's display use is Cabin Regular at 200pt, line-height 0.85.\n     Body is Cabin Regular 16/1.5. */\n  --font-sans: \"Cabin\", \"Helvetica Neue\", Arial, sans-serif;\n  --font-condensed: \"Cabin Condensed\", \"Cabin\", \"Helvetica Neue\", Arial, sans-serif;\n  --font-mono: ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  --fw-regular: 400;\n  --fw-medium:  500;\n  --fw-semibold:700; /* no dedicated SemiBold face; maps to self-hosted Bold */\n  --fw-bold:    700;\n\n  /* Type scale (use these as starting points — tighten per layout). */\n  --fs-display-xl: clamp(72px, 12vw, 200px);\n  --fs-display:    clamp(56px, 8vw, 120px);\n  --fs-h1:         clamp(40px, 6vw, 88px);\n  --fs-h2:         clamp(32px, 4vw, 60px);\n  --fs-h3:         clamp(22px, 2.2vw, 30px);\n  --fs-body-l:     18px;\n  --fs-body:       16px;\n  --fs-body-s:     14px;\n  --fs-caption:    12px;\n  --fs-button:     16px;\n\n  --lh-display: 0.95;\n  --lh-tight:   1.05;\n  --lh-snug:    1.2;\n  --lh-body:    1.5;\n  --lh-loose:   1.7;\n\n  --tracking-display: -0.025em;\n  --tracking-tight:   -0.015em;\n  --tracking-normal:   0em;\n  --tracking-caption:  0.08em;\n}\n\n/* ─── SEMANTIC TYPE CLASSES ──────────────────────────────────\n   Mirror these onto your headings/paragraphs OR use the classes\n   directly. They embody the brand vibe: tight tracking, low\n   line-height for display, lowercase friendly. */\n\nhtml, body { background: var(--bg); color: var(--fg); font-family: var(--font-sans); }\nbody { font-size: var(--fs-body); line-height: var(--lh-body); font-weight: var(--fw-regular); }\n\n.display-xl, .display, h1.display, .hero-headline {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-regular);\n  font-size: var(--fs-display-xl);\n  line-height: var(--lh-display);\n  letter-spacing: var(--tracking-display);\n  text-wrap: balance;\n}\nh1, .h1 {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-regular);\n  font-size: var(--fs-h1);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-tight);\n  text-wrap: balance;\n}\nh2, .h2 {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-regular);\n  font-size: var(--fs-h2);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-tight);\n  text-wrap: balance;\n}\nh3, .h3 {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-medium);\n  font-size: var(--fs-h3);\n  line-height: var(--lh-snug);\n  letter-spacing: 0;\n}\np, .body {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  max-width: 70ch;\n  text-wrap: pretty;\n}\n.body-l { font-size: var(--fs-body-l); line-height: var(--lh-body); }\n.body-s { font-size: var(--fs-body-s); line-height: var(--lh-body); }\n/* Captions and eyebrows are sentence case or lowercase — NEVER uppercase.\n   The brand reserves capitals only for the registered mark (®) and the\n   start of a sentence in long-form prose. */\n.caption {\n  font-size: var(--fs-caption);\n  font-weight: var(--fw-medium);\n  letter-spacing: 0;\n  line-height: 1.4;\n  color: var(--color-grey-500);\n}\n.eyebrow {\n  font-size: 13px;\n  font-weight: var(--fw-medium);\n  letter-spacing: 0;\n}\n\n/* Reusable utility — paint text with the brand spectrum gradient.\n   Hold to display / accent runs; not for body. */\n.text-spectrum {\n  background: var(--gradient-spectrum);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n\n/* Focus ring — Sunny outline, 2px offset, as the brief specifies. */\n:where(button, a, input, select, textarea, [tabindex]):focus-visible {\n  outline: 2px solid var(--color-sunny);\n  outline-offset: 2px;\n  border-radius: var(--radius-sm);\n}\n\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.001ms !important;\n    transition-duration: 0.001ms !important;\n  }\n}\n<\u002Fstyle>\n\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body { background: var(--bg); color: var(--fg); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }\n  a { color: inherit; }\n  .wrap { max-width: 960px; margin: 0 auto; padding: 0 clamp(24px, 5vw, 56px); }\n\n  /* ── hero ─────────────────────────────────────────────── */\n  .hero { position: relative; overflow: hidden; background: var(--color-dark); color: var(--color-light);\n          border-radius: 0 0 var(--radius-xl) var(--radius-xl); padding: clamp(36px,5vw,64px) 0 clamp(44px,6vw,80px); }\n  .hero .sun { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.9; pointer-events: none; }\n  .hero .orbit { position: absolute; right: -10%; top: 46%; transform: translateY(-50%) rotate(-8deg); width: min(640px, 64%);\n                 color: var(--color-ooorange); opacity: 0.45; mix-blend-mode: screen; pointer-events: none; }\n  .hero .orbit svg { width: 100%; height: auto; display: block; }\n  .hero .wrap { position: relative; z-index: 2; }\n  .hero-top { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: clamp(40px,7vw,88px); }\n  .hero-top img { height: 26px; }\n  .hero-top .tag { font-size: 12px; color: rgba(255,251,245,0.6); border: 1px solid rgba(255,251,245,0.24); border-radius: var(--radius-pill); padding: 5px 13px; white-space: nowrap; }\n  .hero-eyebrow { font-size: 13px; font-weight: var(--fw-medium); color: var(--color-sunny); margin: 0 0 16px; display: flex; align-items: center; gap: 9px; }\n  .hero-eyebrow svg { width: 16px; height: 16px; }\n  .hero h1 { font-weight: var(--fw-regular); font-size: clamp(44px,7vw,104px); line-height: 0.96; letter-spacing: var(--tracking-display); margin: 0; text-wrap: balance; }\n  .hero h1 .spectrum { color: transparent; background: var(--gradient-spectrum-diag); -webkit-background-clip: text; background-clip: text; }\n  .hero .lede { font-size: clamp(17px,2vw,21px); color: rgba(255,251,245,0.84); margin: 22px 0 0; max-width: 54ch; line-height: 1.5; }\n\n  /* ── section scaffold ─────────────────────────────────── */\n  .section { padding: clamp(56px,8vw,104px) 0 0; }\n  .section.last { padding-bottom: clamp(56px,8vw,104px); }\n  .eyebrow { font-size: 12px; font-weight: var(--fw-bold); letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-ooorange); margin: 0 0 18px; }\n  .section h2 { font-weight: var(--fw-regular); font-size: clamp(30px,4vw,52px); line-height: 1.04; letter-spacing: var(--tracking-tight); margin: 0 0 28px; text-wrap: balance; }\n\n  /* ── foundation tile grid ─────────────────────────────── */\n  .tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }\n  .tile { border-radius: var(--radius-lg); padding: clamp(26px,3vw,40px); position: relative; overflow: hidden; min-height: 230px; display: flex; flex-direction: column; }\n  .tile .tl { font-size: 12px; font-weight: var(--fw-bold); letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.72; margin-bottom: 16px; }\n  .tile .tx { font-weight: var(--fw-regular); font-size: clamp(21px,2.3vw,28px); line-height: 1.18; letter-spacing: var(--tracking-tight); margin: 0; text-wrap: pretty; }\n  .tile.dark { background: var(--color-dark); color: var(--color-light); }\n  .tile.dark::after { content: \"\"; position: absolute; inset: 0; background: var(--gradient-sunset); opacity: 0.7; pointer-events: none; }\n  .tile.dark > * { position: relative; z-index: 1; }\n  .tile.sunny { background: var(--color-sunny); color: var(--color-dark); }\n  .tile.orange { background: var(--color-ooorange); color: var(--color-light); }\n  .tile.spectrum { background: var(--gradient-spectrum-diag); color: var(--color-dark); }\n  .tile.spectrum .tl { opacity: 0.66; }\n\n  /* ── elevator pitch feature ───────────────────────────── */\n  .pitch { font-weight: var(--fw-regular); font-size: clamp(24px,3.4vw,44px); line-height: 1.16; letter-spacing: var(--tracking-tight); margin: 0; text-wrap: balance; max-width: 22ch; }\n  .pitch .em { color: var(--color-ooorange); }\n  .pitch-sub { font-size: var(--fs-body-l); line-height: 1.55; color: var(--fg-muted); margin: 28px 0 0; max-width: 64ch; }\n\n  /* ── brand story + pullquote ──────────────────────────── */\n  .story { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: clamp(32px,5vw,64px); align-items: start; }\n  .story p { font-size: var(--fs-body-l); line-height: 1.6; color: var(--fg); margin: 0 0 18px; max-width: 60ch; }\n  .story p:last-child { margin-bottom: 0; }\n  .pullquote { background: var(--color-dark); color: var(--color-light); border-radius: var(--radius-lg); padding: clamp(28px,3vw,40px); position: relative; overflow: hidden; align-self: stretch; }\n  .pullquote::after { content: \"\"; position: absolute; inset: 0; background: var(--gradient-sunset); opacity: 0.5; }\n  .pullquote .q { position: relative; z-index: 1; font-size: clamp(22px,2.6vw,30px); line-height: 1.24; letter-spacing: var(--tracking-tight); margin: 0; text-wrap: pretty; }\n  .pullquote .c { position: relative; z-index: 1; font-size: 13px; color: var(--color-sunny); margin-top: 20px; font-weight: var(--fw-medium); }\n\n  /* ── audience ─────────────────────────────────────────── */\n  .aud { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }\n  .card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: clamp(24px,3vw,34px); background: var(--color-light); }\n  .card .ct { font-size: 12px; font-weight: var(--fw-bold); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-subtle); margin-bottom: 12px; }\n  .card .cb { font-size: 17px; line-height: 1.55; color: var(--fg); text-wrap: pretty; }\n  .card .cb strong { font-weight: var(--fw-bold); }\n\n  /* ── positioning list ─────────────────────────────────── */\n  .poslist { list-style: none; margin: 0; padding: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 2px 36px; }\n  .poslist li { display: flex; gap: 14px; align-items: flex-start; padding: 15px 0; border-bottom: 1px solid var(--border); font-size: 16.5px; line-height: 1.45; }\n  .poslist li svg { flex: none; width: 18px; height: 18px; margin-top: 2px; color: var(--color-ooorange); }\n  .poslist li b { font-weight: var(--fw-bold); }\n  .competitors { margin-top: 26px; font-size: 15px; color: var(--fg-muted); }\n  .competitors b { color: var(--fg); font-weight: var(--fw-medium); }\n\n  /* ── colors ───────────────────────────────────────────── */\n  .swatches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }\n  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }\n  .sw .chip { height: 120px; display: flex; align-items: flex-end; padding: 14px; }\n  .sw .meta { padding: 14px 16px; background: var(--color-light); }\n  .sw .nm { font-weight: var(--fw-medium); font-size: 15px; }\n  .sw .hx { font-family: var(--font-mono); font-size: 13px; color: var(--fg-muted); margin-top: 3px; }\n  .sw.wide { grid-column: span 3; }\n  .sw.wide .chip { height: 92px; }\n  .sw .chip .role { font-size: 12px; font-weight: var(--fw-medium); }\n  .legacy-note { margin-top: 22px; background: rgba(255,106,0,0.1); border: 1px solid rgba(255,106,0,0.28); border-radius: var(--radius-md); padding: 18px 22px; }\n  .legacy-note .nh { font-size: 11px; font-weight: var(--fw-bold); letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-ooorange); margin-bottom: 8px; }\n  .legacy-note p { font-size: 14px; line-height: 1.5; color: var(--fg); margin: 0; max-width: 80ch; }\n  .legacy-note code { font-family: var(--font-mono); font-size: 12.5px; background: rgba(30,30,30,0.07); padding: 1px 6px; border-radius: 5px; }\n\n  /* ── values ───────────────────────────────────────────── */\n  .values { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }\n  .value { border-radius: var(--radius-md); border: 1px solid var(--border); padding: 22px 24px; display: flex; gap: 13px; align-items: flex-start; background: var(--color-light); }\n  .value svg { flex: none; width: 20px; height: 20px; color: var(--color-ooorange); margin-top: 1px; }\n  .value span { font-size: 16px; line-height: 1.35; font-weight: var(--fw-medium); }\n\n  /* ── industry / footer ────────────────────────────────── */\n  .industry { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }\n  .industry .pill { background: var(--color-dark); color: var(--color-light); border-radius: var(--radius-pill); padding: 11px 22px; font-size: 16px; font-weight: var(--fw-medium); }\n  .industry .reg { font-size: 15px; color: var(--fg-muted); }\n  .docfoot { margin-top: clamp(48px,7vw,88px); border-top: 1px solid var(--border); padding: 28px 0 60px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }\n  .docfoot img { height: 20px; }\n  .docfoot .meta { font-size: 12.5px; color: var(--fg-subtle); }\n\n  @media (max-width: 780px) {\n    .tiles, .aud, .story, .poslist, .values, .swatches { grid-template-columns: 1fr; }\n    .sw.wide { grid-column: span 1; }\n    .pullquote { margin-top: 8px; }\n  }\n\n  @media print {\n    @page { margin: 13mm; }\n    body { background: #fff; }\n    .hero, .tile, .pullquote, .industry .pill, .sw .chip, .legacy-note { -webkit-print-color-adjust: exact; print-color-adjust: exact; }\n    .section, .story, .tiles, .aud, .swatches, .values, .poslist li, .tile, .pullquote { break-inside: avoid; }\n    .hero { border-radius: 16px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<header class=\"hero\" data-screen-label=\"Cover\">\n  <img class=\"sun\" src=\"2510da62-fc8f-483b-83eb-6cca2dfb381b\" alt=\"\" aria-hidden=\"true\">\n  <div class=\"orbit\" aria-hidden=\"true\" id=\"orbit-host\"><\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"hero-top\">\n      <img src=\"747258d2-110a-409f-9413-7aeb578be489\" alt=\"branday\">\n      <span class=\"tag\">Internal reference · updated May 2026<\u002Fspan>\n    <\u002Fdiv>\n    <p class=\"hero-eyebrow\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 0c.6 6.4 5 10.8 11.4 11.4v1.2C17 13.2 12.6 17.6 12 24h-1.2C10.2 17.6 5.8 13.2-.6 12.6v-1.2C5.8 10.8 10.2 6.4 10.8 0z\" transform=\"translate(0.6 0)\"><\u002Fpath><\u002Fsvg>Brand identity overview<\u002Fp>\n    <h1>The <span class=\"spectrum\">brand<\u002Fspan><br>behind the sparks.<\u002Fh1>\n    <p class=\"lede\">Branday's mission, voice and visual foundations in one place. Read this before you write a headline, brief a designer, or talk to a client.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main>\n  <!-- Foundations -->\n  <section class=\"section\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow\">Foundations<\u002Fp>\n      <h2>What we believe, in four lines.<\u002Fh2>\n      <div class=\"tiles\">\n        <div class=\"tile dark\">\n          <div class=\"tl\">Mission<\u002Fdiv>\n          <p class=\"tx\">Branday gives mid-market teams an AI-powered marketing department: five AI agents that know your brand and run your marketing operations.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"tile sunny\">\n          <div class=\"tl\">Vision<\u002Fdiv>\n          <p class=\"tx\">Every business deserves a marketing team. Branday makes it possible with AI.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"tile orange\">\n          <div class=\"tl\">Brand promise<\u002Fdiv>\n          <p class=\"tx\">Intelligence-informed execution. Brand decisions that are smart, not guesswork, and creative assets that are beautiful and strategic.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"tile spectrum\">\n          <div class=\"tl\">Tagline<\u002Fdiv>\n          <p class=\"tx\">Your AI-powered marketing team. Always on. Always on-brand.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Elevator pitch -->\n  <section class=\"section\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow\">Elevator pitch<\u002Fp>\n      <p class=\"pitch\">From idea to on-brand execution, <span class=\"em\">faster, with AI.<\u002Fspan><\u002Fp>\n      <p class=\"pitch-sub\">Branday helps marketing teams move from idea to on-brand execution faster. We combine prompt-to-image creation, real-time collaboration tools, and on-demand access to professional creative talent: designers, illustrators, 3D artists, and animators.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Brand story -->\n  <section class=\"section\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow\">Brand story<\u002Fp>\n      <div class=\"story\">\n        <div>\n          <p>Most brands create beautiful assets disconnected from strategic thinking. Others do great strategy work but struggle with consistent execution.<\u002Fp>\n          <p>Branday solves this by combining AI-powered brand intelligence (competitive research, campaign planning, institutional memory) with synthetic creative production.<\u002Fp>\n          <p>The result is a full-stack Brand Intelligence Platform where strategy guides execution, and execution informs strategy.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"pullquote\">\n          <p class=\"q\">\"Your designs are only as good as your brand strength, which is only as good as your strategy.\"<\u002Fp>\n          <div class=\"c\">The founding insight<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Audience -->\n  <section class=\"section\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow\">Target audience<\u002Fp>\n      <h2>Who we build for.<\u002Fh2>\n      <div class=\"aud\">\n        <div class=\"card\">\n          <div class=\"ct\">Primary<\u002Fdiv>\n          <p class=\"cb\">Mid-market marketing teams of <strong>10 to 100 people<\u002Fstrong> at companies with multiple brands. Especially teams overwhelmed by AI tools and seeking strategic guidance over feature proliferation.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"ct\">Operating regions<\u002Fdiv>\n          <p class=\"cb\">Global, with <strong>North America<\u002Fstrong> as the primary market. Mid-market focus throughout.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Competitive positioning -->\n  <section class=\"section\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow\">Competitive positioning<\u002Fp>\n      <h2>Why teams pick us.<\u002Fh2>\n      <ul class=\"poslist\">\n        <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14m-7-7 7 7-7 7\"><\u002Fpath><\u002Fsvg><span><b>75% cheaper<\u002Fb> than Writer.com ($99 vs $400 per seat).<\u002Fspan><\u002Fli>\n        <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14m-7-7 7 7-7 7\"><\u002Fpath><\u002Fsvg><span><b>Institutional memory<\u002Fb> that learns from past campaigns.<\u002Fspan><\u002Fli>\n        <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14m-7-7 7 7-7 7\"><\u002Fpath><\u002Fsvg><span><b>Transparent reasoning<\u002Fb> with confidence scores.<\u002Fspan><\u002Fli>\n        <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14m-7-7 7 7-7 7\"><\u002Fpath><\u002Fsvg><span><b>1 to 2 week setup<\u002Fb> versus months for enterprise platforms.<\u002Fspan><\u002Fli>\n        <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14m-7-7 7 7-7 7\"><\u002Fpath><\u002Fsvg><span><b>Strategy-first<\u002Fb> approach, not just content generation.<\u002Fspan><\u002Fli>\n        <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14m-7-7 7 7-7 7\"><\u002Fpath><\u002Fsvg><span><b>Dual-entry model<\u002Fb> enabling SaaS plus services cross-sell.<\u002Fspan><\u002Fli>\n        <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14m-7-7 7 7-7 7\"><\u002Fpath><\u002Fsvg><span><b>Mid-market focus<\u002Fb> (10 to 100 people) versus enterprise bloat.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n      <p class=\"competitors\">Key competitors: <b>Writer.com<\u002Fb>, <b>Xavier AI<\u002Fb>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Colors -->\n  <section class=\"section\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow\">Brand colors<\u002Fp>\n      <h2>The spectrum.<\u002Fh2>\n      <div class=\"swatches\">\n        <div class=\"sw\"><div class=\"chip\" style=\"background:#FFC300;color:#1E1E1E\"><span class=\"role\">Primary accent<\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"nm\">Sunny<\u002Fdiv><div class=\"hx\">#FFC300<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:#FF6A00;color:#FFFBF5\"><span class=\"role\">Secondary accent<\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"nm\">Ooorange<\u002Fdiv><div class=\"hx\">#FF6A00<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:#FF00E5;color:#FFFBF5\"><span class=\"role\">Magenta highlight<\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"nm\">FunSia<\u002Fdiv><div class=\"hx\">#FF00E5<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:#1E1E1E;color:#FFFBF5\"><span class=\"role\">Text &amp; dark surfaces<\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"nm\">Dark<\u002Fdiv><div class=\"hx\">#1E1E1E<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:#FFFBF5;color:#1E1E1E;box-shadow:inset 0 0 0 1px rgba(30,30,30,0.1)\"><span class=\"role\">Page background<\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"nm\">Light<\u002Fdiv><div class=\"hx\">#FFFBF5<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:linear-gradient(135deg,#FF6A00 0%,#FFC300 45%,#FF00E5 100%);color:#1E1E1E\"><span class=\"role\">Signature gradient<\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"nm\">Spectrum<\u002Fdiv><div class=\"hx\">yellow → orange → magenta<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"legacy-note\">\n        <div class=\"nh\">Suggested change · needs approval<\u002Fdiv>\n        <p>These reflect the current rebrand. The prior overview listed the legacy palette (<code>#0066FF<\u002Fcode> blue, <code>#7C3AED<\u002Fcode> purple, <code>#1E293B<\u002Fcode> slate, <code>#F1F5F9<\u002Fcode> gray, <code>#10B981<\u002Fcode> green), which the rebrand replaces. Confirm and I'll keep these, or restore the old set.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Core values -->\n  <section class=\"section\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow\">Core values<\u002Fp>\n      <h2>How we operate.<\u002Fh2>\n      <div class=\"values\">\n        <div class=\"value\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><span>Intelligence-informed execution<\u002Fspan><\u002Fdiv>\n        <div class=\"value\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><span>Institutional memory<\u002Fspan><\u002Fdiv>\n        <div class=\"value\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><span>Transparent reasoning with confidence scores<\u002Fspan><\u002Fdiv>\n        <div class=\"value\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><span>Mid-market focus over enterprise complexity<\u002Fspan><\u002Fdiv>\n        <div class=\"value\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><span>Strategy-first before creative<\u002Fspan><\u002Fdiv>\n        <div class=\"value\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><span>Dual-entry model: SaaS plus services<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Industry + footer -->\n  <section class=\"section last\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow\">Industry<\u002Fp>\n      <div class=\"industry\">\n        <span class=\"pill\">AI agents / Brand Intelligence Platform<\u002Fspan>\n        <span class=\"reg\">Global · North America primary · mid-market focus<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"docfoot\">\n        <img src=\"87bef8e3-5241-4374-900f-ecee8b5f1d37\" alt=\"branday\">\n        <span class=\"meta\">branday.com · confidential, internal use only · updated May 2026<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n\n<script>\n  document.getElementById('orbit-host').innerHTML = '<svg xmlns=\"http://www.w3
